<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="loanManagement.css">
    <title>LogIn Loan Management Web</title>
</head>
<body class="login-body">

    <div id="loader">
        <p>Logging out...</p>
        <img src="https://github.com/ChrisTech-hub/icons/blob/main/loading.gif?raw=true">
    </div>

    <header>
        <div class="search-container">
            <input type="text" placeholder="Search Borrower..." id="search">
            <img src="https://github.com/ChrisTech-hub/icons/blob/main/search.png?raw=true">
        </div>

        <div class="menu">
            <img src="https://github.com/ChrisTech-hub/icons/blob/main/sort.png?raw=true" id="sort">
            <label for="sort">Sort By</label>

            <img src="https://github.com/ChrisTech-hub/icons/blob/main/settings.png?raw=true" id="settings">
            <label for="settings">Settings</label>

            <img src="https://github.com/ChrisTech-hub/icons/blob/main/user.png?raw=true" id="user">
            <label for="sort">Me</label>
        </div>

        <button onclick="logout()" class="log-button">Log-Out</button>
    </header>
    
    <aside class="navbar-aside">
        <h1 class="logo">LOAN RECORD MANAGEMENT</h1>

        <hr>

        <nav class="navbars">
            <ul>
                <li class="nav-list active"><img src="https://github.com/ChrisTech-hub/icons/blob/main/home.png?raw=true" class="nav-image"><span>Dashboard</span></li>
                <li class="nav-list"><img src="https://github.com/ChrisTech-hub/icons/blob/main/payment-method.png?raw=true" class="nav-image"><span>Borrower</span></li>
                <li class="nav-list"><img src="https://github.com/ChrisTech-hub/icons/blob/main/payment-method.png?raw=true" class="nav-image"><span>Payment</span></li>
                <li class="nav-list"><img src="https://github.com/ChrisTech-hub/icons/blob/main/file.png?raw=true" class="nav-image"><span>Information</span></li>
                <li class="nav-list"><img src="https://github.com/ChrisTech-hub/icons/blob/main/data.png?raw=true" class="nav-image"><span>Data</span></li>
            </ul>
        </nav>

        <hr>

        <div class="users">
            <ul id="users">No Users Available</ul>
        </div>
    </aside>

    <script src="loanManagement.js"></script>
</body>
</html>
